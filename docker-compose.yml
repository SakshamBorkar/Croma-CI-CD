version: "3.9"

# ─────────────────────────────────────────────────────────────────
# Croma CI Platform — Local Development Stack
#
# Services:
#   backend   → FastAPI on :8000
#   postgres  → PostgreSQL on :5432
#   redis     → Redis on :6379
#   airflow   → Airflow webserver on :8080
#   ollama    → Ollama LLM server on :11434 (GPU passthrough if available)
#
# Usage:
#   docker-compose up -d
#   docker exec croma-ollama ollama pull mistral
#   docker exec croma-ollama ollama pull nomic-embed-text
# ─────────────────────────────────────────────────────────────────

services:

  # ── Ollama — local LLM server ───────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: croma-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # Uncomment for NVIDIA GPU:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ── PostgreSQL ──────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: croma-postgres
    environment:
      POSTGRES_USER: croma
      POSTGRES_PASSWORD: croma
      POSTGRES_DB: croma_ci
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U croma -d croma_ci"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ───────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: croma-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── FastAPI Backend ─────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: croma-backend
    ports:
      - "8000:8000"
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_LLM_MODEL: mistral
      OLLAMA_EMBED_MODEL: nomic-embed-text
      DATABASE_URL: postgresql+asyncpg://croma:croma@postgres:5432/croma_ci
      REDIS_URL: redis://redis:6379/0
      CHROMA_PERSIST_DIR: /app/chroma_db
      JWT_SECRET_KEY: dev_secret_change_in_prod
      DEBUG: "true"
    volumes:
      - chroma_data:/app/chroma_db
      - ./backend:/app   # hot-reload in dev
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_healthy
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ── Airflow (standalone mode for local dev) ─────────────────────
  airflow:
    image: apache/airflow:2.9.1-python3.11
    container_name: croma-airflow
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://croma:croma@postgres:5432/croma_ci
      AIRFLOW__CORE__FERNET_KEY: "46BKJoQYlPPOexq0OhDZnIlNepKFf87WFwLt0nIe3pY="
      AIRFLOW__WEBSERVER__SECRET_KEY: "dev_airflow_secret"
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: "true"
      OLLAMA_BASE_URL: http://ollama:11434
      DATABASE_URL: postgresql+asyncpg://croma:croma@postgres:5432/croma_ci
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8080:8080"
    volumes:
      - ./dags:/opt/airflow/dags
      - ./backend:/opt/airflow/backend
      - airflow_logs:/opt/airflow/logs
      - chroma_data:/app/chroma_db
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      bash -c "airflow db migrate &&
               airflow users create --username admin --password admin
                 --firstname Admin --lastname User --role Admin --email admin@croma.com &&
               airflow webserver & airflow scheduler"
    restart: unless-stopped

volumes:
  ollama_data:
  postgres_data:
  redis_data:
  chroma_data:
  airflow_logs:
