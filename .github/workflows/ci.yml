# .github/workflows/ci.yml
# ─────────────────────────
# Runs on every PR and push to main.
# Checks: lint → test → build

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

jobs:
  # ── Backend tests ─────────────────────────────────────────────
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: croma
          POSTGRES_PASSWORD: croma
          POSTGRES_DB: croma_ci_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 3s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint (ruff)
        run: pip install ruff && ruff check app/ ../tests/ || true

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://croma:croma@localhost:5432/croma_ci_test
          REDIS_URL: redis://localhost:6379/0
          OLLAMA_BASE_URL: http://localhost:11434   # will fail gracefully (mocked)
          JWT_SECRET_KEY: test_secret
          CHROMA_PERSIST_DIR: /tmp/chroma_test
          PYTHONPATH: .
        run: |
          pip install pytest pytest-asyncio httpx
          pytest ../tests/ -v --tb=short -x

  # ── Docker build ──────────────────────────────────────────────
  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: backend-test

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build ./backend -t croma-ci-backend:test

  # ── Deploy to Cloud Run (main branch only) ────────────────────
  deploy-backend:
    name: Deploy Backend → Cloud Run
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read
      id-token: write  # Workload Identity Federation

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Build and push to Artifact Registry
        run: |
          gcloud builds submit ./backend \
            --tag ${{ secrets.GCP_ARTIFACT_REGISTRY }}/croma-ci-backend:${{ github.sha }}

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy croma-ci-backend \
            --image ${{ secrets.GCP_ARTIFACT_REGISTRY }}/croma-ci-backend:${{ github.sha }} \
            --region asia-south1 \
            --platform managed \
            --allow-unauthenticated \
            --set-secrets "JWT_SECRET_KEY=jwt-secret:latest" \
            --set-env-vars "OLLAMA_BASE_URL=${{ secrets.OLLAMA_BASE_URL }}" \
            --memory 4Gi \
            --cpu 2 \
            --min-instances 0 \
            --max-instances 10
