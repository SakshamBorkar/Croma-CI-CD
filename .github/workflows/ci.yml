# .github/workflows/ci.yml
# ─────────────────────────
# Runs on every PR and push to main.
# Checks: lint → test → build

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

jobs:
  # ── Docker build ──────────────────────────────────────────────
  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Build backend image
        run: docker build ./backend -t croma-ci-backend:test

  # ── Deploy to Cloud Run (main branch only) ────────────────────
  deploy-backend:
    name: Deploy Backend → Cloud Run
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read
      id-token: write  # Workload Identity Federation

    steps:
      - uses: actions/checkout@v5

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Build and push to Artifact Registry
        run: |
          gcloud builds submit ./backend \
            --tag ${{ secrets.GCP_ARTIFACT_REGISTRY }}/croma-ci-backend:${{ github.sha }}

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy croma-ci-backend \
            --image ${{ secrets.GCP_ARTIFACT_REGISTRY }}/croma-ci-backend:${{ github.sha }} \
            --region asia-south1 \
            --platform managed \
            --allow-unauthenticated \
            --set-secrets "JWT_SECRET_KEY=jwt-secret:latest" \
            --set-env-vars "OLLAMA_BASE_URL=${{ secrets.OLLAMA_BASE_URL }}" \
            --memory 4Gi \
            --cpu 2 \
            --min-instances 0 \
            --max-instances 10
